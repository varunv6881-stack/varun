<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Landing Page</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Navbar */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    padding: 15px 0;
    text-align: center;
    background: transparent;
    transition: 0.3s;
    z-index: 1000;
}

nav.scrolled {
    background: #222;
}

nav a {
    color: white;
    margin: 0 20px;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

nav a:hover {
    color: #00f2fe;
}

/* Sections */
section {
    height: 100vh;
    padding-top: 80px;
    text-align: center;
    color: white;
}

#home {
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

#about {
    background: linear-gradient(to right, #43e97b, #38f9d7);
}

#services {
    background: linear-gradient(to right, #fa709a, #fee140);
}

#contact {
    background: linear-gradient(to right, #30cfd0, #330867);
}

/* Content */
h1 {
    margin-top: 100px;
    font-size: 40px;
}

p {
    margin: 20px;
    font-size: 18px;
}

/* Responsive */
@media(max-width: 600px) {
    nav a {
        display: block;
        margin: 10px 0;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav id="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
</nav>

<!-- Sections -->
<section id="home">
    <h1>Welcome to My Website</h1>
    <p>This is a responsive landing page.</p>
</section>

<section id="about">
    <h1>About Us</h1>
    <p>We create modern and responsive web designs.</p>
</section>

<section id="services">
    <h1>Services</h1>
    <p>Web Development, UI Design, and more.</p>
</section>

<section id="contact">
    <h1>Contact</h1>
    <p>Email: example@email.com</p>
</section>

<script>
// Change navbar color on scroll
window.addEventListener("scroll", function() {
    const navbar = document.getElementById("navbar");
    if (window.scrollY > 50) {
        navbar.classList.add("scrolled");
    } else {
        navbar.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
